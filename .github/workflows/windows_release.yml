name: Windows Release

on:
  push:
    branches: [ discovery-app ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true  # cancels the older run in favour of the newer one
  
jobs:
  build_windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Create missing directories for assets
      run: |
        mkdir -p assets/fonts
        mkdir -p assets/data
        mkdir -p assets/images/process
        mkdir -p assets/images/people
        # Flutter requires at least one file or the directory to exist for asset resolution
        touch assets/fonts/.gitkeep
        touch assets/data/.gitkeep
        touch assets/images/process/.gitkeep
        touch assets/images/people/.gitkeep
      shell: bash

    - name: Get Dependencies
      run: flutter pub get

    - name: Build Windows
      run: flutter build windows --release

    - name: Compile Inno Setup Script
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: windows/prism_installer.iss

    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: Discover-PRISM-Windows-Installer
        path: build/windows/installer/Discover_PRISM_Setup.exe
